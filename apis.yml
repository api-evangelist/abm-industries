description: >-
  ABM Industries provides facility, engineering and infrastructure, and mobility
  solutions helping organizations with health and safety, resilience, productivity,
  and sustainability. ABM serves over 100,000 employees across industries including
  aerospace, aviation, commercial real estate, data centers, healthcare, and more.
  ABM Connect is their data intelligence platform that unifies facility, financial,
  equipment, IoT, and service-delivery data.
