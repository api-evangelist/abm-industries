    description: >-
      ABM Connect is a data intelligence platform that unifies facility, financial,
      equipment, IoT, and service-delivery data into a real-time, action-focused view.
      It aggregates data from front-line team members, safety incidents, financial data,
      work orders, and IoT sensors to deliver configurable analytics and smart routing.
