principles:
  - name: Visibility
    description: ABM Connect dashboards expose facility, financial, and IoT data to the customer; track
      usage as part of facilities operations rather than a metered API.
  - name: Allocation
    description: Allocate cost to the facilities-management or real-estate function that owns the ABM
      services contract.
  - name: Optimization
    description: Optimize by tuning IoT polling cadence and analytics-job frequency inside ABM Connect
      to actual decision needs.
  - name: Accountability
    description: Real-estate / facilities leadership owns the ABM relationship; IT owns the data-feed
      integration. Review usage during quarterly business reviews.
